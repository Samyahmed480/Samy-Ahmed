<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>إدارة المشاريع</title>
        <link rel="stylesheet" href="dark-cv.css">
        <link rel="stylesheet" href="admin.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>

    <body>
        <div class="admin-container">
            <header class="admin-header">
                <h1>لوحة إدارة المشاريع</h1>
                <a href="dark-cv.html" class="back-btn">
                    <i class="fas fa-home"></i>
                    <span>الرئيسية</span>
                </a>
            </header>

            <div class="admin-content">
                <section class="profile-settings">
                    <h2>إعدادات الملف الشخصي</h2>
                    <form id="profileForm" class="profile-form">
                        <div class="profile-preview">
                            <div class="current-image">
                                <img id="previewProfileImage" src="logo.png" alt="الصورة الشخصية">
                            </div>
                            <div class="form-group">
                                <label for="profileImage" class="upload-label">
                                    <i class="fas fa-camera"></i>
                                    تغيير الصورة
                                </label>
                                <input type="file" id="profileImage" accept="image/*" hidden>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary">
                                <i class="fas fa-save"></i>
                                حفظ الصورة
                            </button>
                        </div>
                    </form>
                </section>

                <section class="logo-settings">
                    <h2>إعدادات الشعار</h2>
                    <form id="logoForm" class="logo-form">
                        <div class="form-group">
                            <label for="logoText">نص الشعار</label>
                            <input type="text" id="logoText" value="CV" required>
                        </div>

                        <div class="logo-preview">
                            <div class="logo">
                                <span class="logo-text" id="previewLogoText">CV</span>
                                <div class="logo-circle"></div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>لون الشعار</label>
                            <div class="color-inputs">
                                <div class="color-group">
                                    <label for="logoColor">لون النص</label>
                                    <input type="color" id="logoColor" value="#000000">
                                </div>
                                <div class="color-group">
                                    <label for="glowColor">لون التوهج</label>
                                    <input type="color" id="glowColor" value="#4a90e2">
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-primary">
                                <i class="fas fa-save"></i>
                                حفظ التغييرات
                            </button>
                        </div>
                    </form>
                </section>

                <section class="add-project">
                    <h2>إضافة مشروع جديد</h2>
                    <form id="projectForm" class="project-form">
                        <div class="form-group">
                            <label for="projectTitle">عنوان المشروع</label>
                            <input type="text" id="projectTitle" required>
                        </div>

                        <div class="form-group">
                            <label for="projectDesc">وصف المشروع</label>
                            <textarea id="projectDesc" rows="4" required></textarea>
                        </div>

                        <div class="form-group">
                            <label for="projectImage">صورة المشروع</label>
                            <input type="file" id="projectImage" accept="image/*" required>
                            <div class="image-preview"></div>
                        </div>

                        <div class="form-group">
                            <label>التقنيات المستخدمة</label>
                            <div class="tags-input">
                                <input type="text" id="techInput" placeholder="اضغط Enter لإضافة تقنية">
                                <div class="tags-container"></div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="projectDemo">رابط العرض الحي</label>
                            <input type="url" id="projectDemo">
                        </div>

                        <div class="form-group">
                            <label for="projectCode">رابط الشيفرة المصدرية</label>
                            <input type="url" id="projectCode">
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-primary">
                                <i class="fas fa-plus"></i>
                                إضافة المشروع
                            </button>
                            <button type="reset" class="btn-secondary">
                                <i class="fas fa-redo"></i>
                                إعادة تعيين
                            </button>
                        </div>
                    </form>
                </section>

                <section class="projects-list">
                    <h2>المشاريع الحالية</h2>
                    <div class="projects-grid">
                        <!-- نموذج لمشروع -->
                        <div class="project-card">
                            <div class="project-header">
                                <img src="project1.jpg" alt="صورة المشروع">
                                <div class="project-actions">
                                    <button class="btn-edit" title="تعديل">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn-delete" title="حذف">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                    <button class="btn-visibility" title="إخفاء/إظهار">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="project-info">
                                <h3>عنوان المشروع</h3>
                                <p>وصف المشروع</p>
                                <div class="project-tech">
                                    <span>HTML</span>
                                    <span>CSS</span>
                                    <span>JavaScript</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
        <script src="admin.js"></script>
    </body>

</html>
